<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>BiteFight Dashboard</title>
    <style>
        body { background-color: #0e0a0a; color: #ccc; font-family: Tahoma, sans-serif; text-align: center; padding: 2px; font-size: 11px; }
        .tabs { display: flex; justify-content: center; gap: 5px; margin-bottom: 8px; }
        .tab-btn { background: #222; color: #888; border: 1px solid #444; padding: 3px 10px; cursor: pointer; border-radius: 3px; }
        .tab-btn.active { background: #800; color: white; }
        table { margin: 0 auto; border-collapse: collapse; width: 100%; max-width: 1400px; background-color: #1a1a1a; font-size: 11px; }
        th, td { border: 1px solid #333; padding: 2px; text-align: center; }
        th { background: #333; cursor: pointer; color: #fff; }
        #sectionTracker, #sectionRanking { display: none; }
        #sectionTracker.active, #sectionRanking.active { display: block; }
        .przyrost-col { color: #5f5; } .strata-col { color: #f55; }
    </style>
</head>
<body>
    <div class="tabs">
        <button id="tabTrackerBtn" class="tab-btn active" onclick="switchTab('tracker')">Gracze</button>
        <button id="tabRankingBtn" class="tab-btn" onclick="switchTab('ranking')">TOP 100</button>
    </div>
    <div id="sectionTracker" class="active">
        <select id="filterDate"><option value="LAST_3_DAYS">Ostatnie 3 dni</option><option value="ALL">Całość</option></select>
        <div id="tableContainer"></div>
    </div>
    <div id="sectionRanking"><div id="rankingTableContainer"></div></div>

    <script>
        const urlGoogleSheet = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQUL3LMQgsMw_kzKZkvQ8cKEp7XuCGkuPaWGVbQlGHdz8-C_oTMSZC7oEJjfzE5wwo-UoqmFU6FdAPT/pub?gid=0&single=true&output=csv";
        const urlRankingSheet = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQUL3LMQgsMw_kzKZkvQ8cKEp7XuCGkuPaWGVbQlGHdz8-C_oTMSZC7oEJjfzE5wwo-UoqmFU6FdAPT/pub?gid=109350413&single=true&output=csv";
        let globalData = [], globalRankingData = [];

        async function switchTab(tabId) {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.querySelectorAll('div[id^="section"]').forEach(s => s.classList.remove('active'));
            if (tabId === 'tracker') {
                document.getElementById('tabTrackerBtn').classList.add('active');
                document.getElementById('sectionTracker').classList.add('active');
            } else {
                document.getElementById('tabRankingBtn').classList.add('active');
                document.getElementById('sectionRanking').classList.add('active');
                if (!globalRankingData.length) loadRankingData();
            }
        }

        async function loadTableData() {
            const resp = await fetch(urlGoogleSheet + '&t=' + new Date().getTime());
            const text = await resp.text();
            globalData = text.trim().split('\n').slice(1).map(r => r.split(','));
            renderTracker();
        }

        function renderTracker() {
            const filter = document.getElementById('filterDate').value;
            const cutoff = new Date(); cutoff.setDate(cutoff.getDate() - 3);
            
            let html = "<table><thead><tr><th>Data</th><th>Gracz</th><th>Stat</th><th>Zmiana</th></tr></thead><tbody>";
            globalData.forEach(row => {
                // LOGIKA FILTROWANIA: Jeśli 'LAST_3_DAYS', pokazuj tylko jeśli data jest nowsza niż 3 dni
                if(filter === 'LAST_3_DAYS') {
                    let d = new Date(row[0].split(' ')[0].split('.').reverse().join('-'));
                    if(d < cutoff) return;
                }
                html += `<tr><td>${row[0]}</td><td>${row[1]}</td><td>${row[2]}</td><td>${row[5]}</td></tr>`;
            });
            document.getElementById('tableContainer').innerHTML = html + "</tbody></table>";
        }

        document.getElementById('filterDate').addEventListener('change', renderTracker);

        async function loadRankingData() {
            const resp = await fetch(urlRankingSheet + '&t=' + new Date().getTime());
            const text = await resp.text();
            globalRankingData = text.trim().split('\n').map(r => r.split(','));
            renderRanking();
        }

        function renderRanking() {
            let html = "<table><thead><tr>";
            globalRankingData[0].forEach((h, i) => html += `<th onclick="sortR(${i})">${h}</th>`);
            html += "</tr></thead><tbody>";
            globalRankingData.slice(1).forEach(r => html += "<tr>" + r.map(c => `<td>${c}</td>`).join("") + "</tr>");
            document.getElementById('rankingTableContainer').innerHTML = html + "</tbody></table>";
        }
        
        function sortR(col) {
            globalRankingData.slice(1).sort((a,b) => {
                let vA = parseFloat(a[col].replace(/[^\d]/g, '')), vB = parseFloat(b[col].replace(/[^\d]/g, ''));
                return isNaN(vA) ? a[col].localeCompare(b[col]) : vB - vA;
            });
            renderRanking();
        }

        loadTableData();
    </script>
</body>
</html>
