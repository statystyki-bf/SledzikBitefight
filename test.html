<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BiteFight - Centrum Dowodzenia</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🐺</text></svg>">
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        body { background-color: #1e0e0e; color: #e0e0e0; font-family: Arial, sans-serif; text-align: center; padding: 10px; margin: 0; overflow-x: hidden; }
        h1 { font-size: 28px; color: #c00c0c; margin-bottom: 5px; margin-top: 10px; }
        h2 { font-size: 20px; color: #ffcc00; margin-top: 15px; margin-bottom: 10px; text-transform: uppercase; }
        .tabs { display: flex; justify-content: center; gap: 15px; margin-top: 15px; margin-bottom: 20px; flex-wrap: wrap;}
        .tab-btn { background: #2b1717; color: #888; border: 2px solid #600000; padding: 8px 20px; font-size: 16px; cursor: pointer; border-radius: 6px; font-weight: bold; transition: 0.3s; }
        .tab-btn:hover { background: #4a2727; color: white; }
        .tab-btn.active { background: #c00c0c; color: white; border-color: #ff3333; box-shadow: 0 0 10px rgba(255, 51, 51, 0.5); }
        button.action-btn { background: #1f7244; color: white; border: 2px solid #103c23; padding: 6px 15px; font-size: 14px; cursor: pointer; border-radius: 6px; font-weight: bold; margin-bottom: 15px; transition: 0.3s; }
        button.action-btn:hover { background: #165231; transform: scale(1.05); }
        #status { color: #888; font-size: 12px; margin-bottom: 15px;}
        .filter-container { margin-bottom: 15px; margin-top: 10px; display: flex; justify-content: center; gap: 10px; flex-wrap: wrap; align-items: center; }
        select, input[type="date"] { background-color: #2b1717; color: white; border: 1px solid #600000; padding: 5px 10px; font-size: 13px; border-radius: 4px; outline: none; cursor: pointer; transition: 0.2s; color-scheme: dark; }
        
        table { margin: 0 auto; border-collapse: collapse; width: 98%; max-width: 1600px; background-color: #2b1717; box-shadow: 0 0 10px rgba(0,0,0,0.8); font-size: 12px; }
        th, td { border: 1px solid #600000; padding: 5px 6px; text-align: center; }
        th { background-color: #600000; color: white; font-weight: bold; text-transform: uppercase; user-select: none; font-size: 11px; }
        th.sortable:hover { background-color: #ff3333; cursor: pointer; }
        tr:nth-child(even) { background-color: #381e1e; }
        tr:hover { background-color: #4a2727; }
        
        .przyrost-col { color: #55ff55; font-weight: bold; }
        .strata-col { color: #ff5555; font-weight: bold; }
        .suma-col { color: #ffcc00; font-weight: bold; }
        .wystajace-col { color: #ff3333; font-weight: bold; }
        .level-col { color: #00e5ff; font-weight: bold; font-size: 13px; }
        .separator { border: 1px solid #600000; width: 95%; max-width: 1600px; margin: 20px auto; }
        .summary-box { background: #231212; padding: 10px; border-radius: 8px; border: 1px solid #4a0d0d; margin: 0 auto 15px auto; width: 98%; max-width: 1600px; }
        
        #sectionTracker, #sectionRanking, #sectionHeatmap, #sectionClans, #sectionTools { display: none; }
        #sectionTracker.active, #sectionRanking.active, #sectionHeatmap.active, #sectionClans.active, #sectionTools.active { display: block; }
        .rasa-wampir { color: #ff4444; font-weight: bold; text-transform: uppercase; }
        .rasa-wilkolak { color: #aaaaaa; font-weight: bold; text-transform: uppercase; }
        .rank-num { font-size: 13px; color: #ffcc00; font-weight: bold; }
        
        .chart-container { width: 95%; max-width: 1400px; margin: 20px auto; height: 500px; background: #231212; padding: 15px; border-radius: 8px; border: 1px solid #4a0d0d; box-shadow: 0 0 10px rgba(0,0,0,0.8); }
        .kicks-chart-container { width: 95%; max-width: 1000px; margin: 20px auto; height: 250px; background: #231212; padding: 15px; border-radius: 8px; border: 1px solid #4a0d0d; box-shadow: 0 0 10px rgba(0,0,0,0.8); }
        
        a.player-link { color: #00e5ff; text-decoration: none; font-weight: bold; transition: 0.2s; position: relative; z-index: 10; pointer-events: auto; }
        a.player-link:hover { color: #ffffff !important; text-decoration: underline !important; }
        .clan-text-plain { color: #ccc; }
        
        .holder-us { color: #55ff55; font-weight: bold; font-size: 12px; text-shadow: 0 0 5px rgba(85,255,85,0.5);}
        
        .seal-board { display: flex; justify-content: center; gap: 8px; flex-wrap: wrap; margin: 20px auto; max-width: 100%; }
        .seal-badge { 
            background: #110505; 
            border: 1px solid #3a0a0a; 
            border-radius: 2px; 
            padding: 8px; 
            width: 130px; 
            box-shadow: inset 0 0 15px rgba(0,0,0,0.9), 0 0 5px rgba(0,0,0,0.8); 
            display: flex; flex-direction: column; align-items: center; 
        }

        .seal-img { width: 44px; height: 44px; border: 2px ridge #808080; border-radius: 2px; box-shadow: 0 0 6px rgba(0,0,0,1); margin-bottom: 8px; }
        .seal-name { font-size: 11px; font-weight: bold; color: #ffaaaa; text-transform: uppercase; margin-bottom: 5px; width: 100%; letter-spacing: 0.5px; border-bottom: 1px solid #4a0d0d; padding-bottom: 4px; }
        .seal-holder { font-size: 11px; font-weight: bold; margin-bottom: 4px; width: 100%; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; position: relative; z-index: 10; }
        .seal-date { font-size: 9px; color: #888; border-top: 1px solid #2d0a0a; padding-top: 4px; width: 100%; font-family: monospace; }
        
        /* ZAKŁADKA PRZYBORNIKA */
        .tools-layout { display: flex; flex-direction: column; gap: 20px; max-width: 1000px; margin: 0 auto; align-items: center; }
        .links-section { display: flex; flex-direction: column; gap: 10px; width: 100%; max-width: 350px; }
        .links-section a { color: #ffcc00; text-decoration: none; background: #2b1717; padding: 10px 15px; border-radius: 4px; border: 1px solid #600000; transition: 0.3s; font-weight: bold; display: flex; align-items: center; justify-content: center; gap: 8px; box-shadow: 0 0 8px rgba(0,0,0,0.8); font-size: 13px; }
        .links-section a:hover { background: #ff3333; color: white; border-color: #ffaaaa; box-shadow: 0 0 12px rgba(255, 51, 51, 0.6); transform: scale(1.02); }
        
        .tools-grid { display: flex; flex-wrap: wrap; justify-content: center; gap: 15px; width: 100%; }
        .tool-box { background: #1a0a0a; border: 1px solid #600000; border-radius: 6px; padding: 15px; width: 300px; box-shadow: inset 0 0 15px rgba(0,0,0,0.9); text-align: left; }
        .tool-title { font-size: 14px; color: #ffaa00; margin-bottom: 10px; border-bottom: 1px solid #330000; padding-bottom: 4px; font-weight: bold; text-transform: uppercase; text-align: center;}
        .tool-input-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
        .tool-input-row label { color: #ccc; font-size: 12px; font-weight: bold;}
        .tool-input-row input { width: 80px; padding: 3px; text-align: right; font-size: 12px; background: #111; color: #ffcc00; border: 1px solid #444; border-radius: 3px;}
        .tool-result { margin-top: 10px; padding: 8px; background: #000; border: 1px solid #333; color: #55ff55; font-weight: bold; text-align: center; border-radius: 4px; min-height: 18px; font-size: 12px;}
        .tool-btn { width: 100%; margin-top: 5px; background: #4a0d0d; border: 1px solid #ff3333; padding: 6px; color: white; cursor: pointer; border-radius: 4px; font-weight: bold; transition: 0.2s; font-size: 12px;}
        .tool-btn:hover { background: #ff3333; color: black; }
    </style>
</head>
<body>
    <h1>Statystyki BiteFight</h1>
    <div class="tabs">
        <button id="tabTrackerBtn" class="tab-btn active" onclick="switchTab('tracker')">Twoi Gracze (Live)</button>
        <button id="tabHeatmapBtn" class="tab-btn" onclick="switchTab('heatmap')">Analiza Rutyny (2-min)</button>
        <button id="tabRankingBtn" class="tab-btn" onclick="switchTab('ranking')">Ranking Serwera TOP 100</button>
        <button id="tabClansBtn" class="tab-btn" onclick="switchTab('clans')">Pieczątki i Klany</button>
        <button id="tabToolsBtn" class="tab-btn" onclick="switchTab('tools')">Przybornik</button>
    </div>

    <div id="sectionTracker" class="active">
        <div id="lastRefresh" style="color: #00e5ff; font-size: 14px; margin-bottom: 8px; font-weight: bold;"></div>
        <div id="status">Skrypt pobiera z arkusza maksymalnie 7 dni logów.</div>
        <button class="action-btn" onclick="window.location.href = urlGoogleSheet">Pobierz pełny raport (.csv)</button>

        <div class="summary-box">
            <div class="filter-container" style="margin-top: 0; margin-bottom: 8px;">
                <span style="font-size: 15px; font-weight: bold; color: #ffcc00;">Podsumowanie przyrostów:</span>
                <select id="summaryPeriodSelect">
                    <option value="TODAY" selected>Dzisiaj (Od północy)</option>
                    <option value="YESTERDAY">Wczoraj</option>
                    <option value="DAY_BEFORE_YESTERDAY">Przedwczoraj</option>
                    <option value="LAST_3_DAYS">Łącznie z 3 ostatnich dni</option>
                </select>
            </div>
            <div id="summaryContainer"></div>
        </div>
        <hr class="separator">
        <h2>Pełny log operacji</h2>
        <div class="filter-container">
            <select id="filterDate">
                <option value="TODAY" selected>Tylko Dzisiaj</option>
                <option value="YESTERDAY">Tylko Wczoraj</option>
                <option value="DAY_BEFORE_YESTERDAY">Tylko Przedwczoraj</option>
                <option value="LAST_3_DAYS">Wszystko (Ostatnie 3 dni)</option>
            </select>
            <select id="filterPlayer"><option value="ALL">Wszyscy gracze</option></select>
            <select id="filterStat"><option value="ALL">Wszystkie statystyki</option></select>
        </div>
        <div id="tableContainer"><p>Ładowanie najnowszych danych...</p></div>
    </div>

    <div id="sectionHeatmap">
        <h2>Precyzyjny Wykres Aktywności (Interwały 2-minutowe)</h2>
        <div style="color: #888; font-size: 12px; margin-bottom: 15px;">Wybierz gracza i dzień, aby zobaczyć dokładne piki jego logowań.</div>
        <div class="filter-container">
            <select id="heatmapPlayerSelect" onchange="renderChart()">
                <option value="ALL">Wybierz gracza...</option>
            </select>
            <select id="heatmapDaySelect" onchange="renderChart()">
                <option value="ALL" selected>Cały Tydzień (Suma Aktywności)</option>
                <option value="WORKDAYS">Dni robocze (Poniedziałek - Piątek)</option>
                <option value="WEEKEND">Weekend (Sobota - Niedziela)</option>
                <option value="1">Poniedziałki</option>
                <option value="2">Wtorki</option>
                <option value="3
