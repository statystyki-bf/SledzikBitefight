<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>BiteFight - Centrum Dowodzenia</title>
    <style>
        body { background-color: #1e0e0e; color: #e0e0e0; font-family: sans-serif; text-align: center; padding: 5px; margin: 0; }
        h1 { font-size: 20px; color: #c00c0c; margin: 5px 0; }
        .tabs { display: flex; justify-content: center; gap: 5px; margin-bottom: 10px; }
        .tab-btn { background: #2b1717; color: #ccc; border: 1px solid #600000; padding: 5px 15px; font-size: 13px; cursor: pointer; border-radius: 4px; }
        .tab-btn.active { background: #c00c0c; color: white; }
        table { margin: 0 auto; border-collapse: collapse; width: 100%; max-width: 1200px; background-color: #2b1717; font-size: 11px; }
        th, td { border: 1px solid #400000; padding: 3px 4px; text-align: center; }
        th { background-color: #500000; color: white; cursor: pointer; }
        .przyrost-col { color: #5f5; } .strata-col { color: #f55; } .suma-col { color: #fc0; }
        #sectionTracker, #sectionRanking { display: none; }
        #sectionTracker.active, #sectionRanking.active { display: block; }
    </style>
</head>
<body>
    <h1>Centrum Dowodzenia</h1>
    <div class="tabs">
        <button id="tabTrackerBtn" class="tab-btn active" onclick="switchTab('tracker')">Gracze</button>
        <button id="tabRankingBtn" class="tab-btn" onclick="switchTab('ranking')">TOP 100</button>
    </div>
    <div id="sectionTracker" class="active"><div id="tableContainer"></div></div>
    <div id="sectionRanking"><div id="rankingTableContainer"></div></div>

    <script>
        const urlRankingSheet = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQUL3LMQgsMw_kzKZkvQ8cKEp7XuCGkuPaWGVbQlGHdz8-C_oTMSZC7oEJjfzE5wwo-UoqmFU6FdAPT/pub?gid=109350413&single=true&output=csv"; 
        
        function switchTab(tabId) {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.querySelectorAll('div[id^="section"]').forEach(s => s.classList.remove('active'));
            if (tabId === 'tracker') {
                document.getElementById('tabTrackerBtn').classList.add('active');
                document.getElementById('sectionTracker').classList.add('active');
            } else {
                document.getElementById('tabRankingBtn').classList.add('active');
                document.getElementById('sectionRanking').classList.add('active');
                loadRankingData();
            }
        }

        async function loadRankingData() {
            const response = await fetch(urlRankingSheet + '&t=' + new Date().getTime());
            const text = await response.text();
            const rows = text.trim().split('\n').map(r => r.split(','));
            let html = "<table><thead><tr>";
            rows[0].forEach((h, i) => html += `<th onclick="sort(${i})">${h} ⇕</th>`);
            html += "</tr></thead><tbody>";
            for(let i=1; i<rows.length; i++) {
                html += "<tr>" + rows[i].map(c => `<td>${c}</td>`).join("") + "</tr>";
            }
            document.getElementById('rankingTableContainer').innerHTML = html + "</tbody></table>";
        }
    </script>
</body>
</html>
