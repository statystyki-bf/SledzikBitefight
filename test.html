<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BiteFight - Centrum Dowodzenia</title>
    <style>
        body { background-color: #1e0e0e; color: #e0e0e0; font-family: Arial, sans-serif; text-align: center; padding: 20px; margin: 0; }
        h1 { font-size: 36px; color: #c00c0c; margin-bottom: 5px; }
        h2 { font-size: 26px; color: #ffcc00; margin-top: 30px; margin-bottom: 15px; text-transform: uppercase; }
        
        /* Stylizacja zakładek (Tabs) */
        .tabs { display: flex; justify-content: center; gap: 20px; margin-top: 20px; margin-bottom: 30px; }
        .tab-btn { background: #2b1717; color: #888; border: 2px solid #600000; padding: 15px 40px; font-size: 22px; cursor: pointer; border-radius: 8px; font-weight: bold; transition: 0.3s; }
        .tab-btn:hover { background: #4a2727; color: white; }
        .tab-btn.active { background: #c00c0c; color: white; border-color: #ff3333; box-shadow: 0 0 15px rgba(255, 51, 51, 0.5); }
        
        button.action-btn { background: #1f7244; color: white; border: 2px solid #103c23; padding: 10px 20px; font-size: 16px; cursor: pointer; border-radius: 8px; font-weight: bold; margin-bottom: 20px; transition: 0.3s; }
        button.action-btn:hover { background: #165231; transform: scale(1.05); }
        
        #status { color: #888; font-size: 14px; margin-bottom: 20px;}
        .filter-container { margin-bottom: 25px; margin-top: 20px; display: flex; justify-content: center; gap: 15px; flex-wrap: wrap; align-items: center; }
        select, input[type="date"] { background-color: #2b1717; color: white; border: 1px solid #600000; padding: 10px 15px; font-size: 16px; border-radius: 5px; outline: none; cursor: pointer; transition: 0.2s; color-scheme: dark; }
        table { margin: 0 auto; border-collapse: collapse; width: 95%; max-width: 1550px; background-color: #2b1717; box-shadow: 0 0 15px rgba(0,0,0,0.8); font-size: 14px; }
        th, td { border: 1px solid #600000; padding: 10px; text-align: center; }
        th { background-color: #600000; color: white; font-weight: bold; text-transform: uppercase; }
        tr:nth-child(even) { background-color: #381e1e; }
        tr:hover { background-color: #4a2727; }
        
        .przyrost-col { color: #55ff55; font-weight: bold; }
        .strata-col { color: #ff5555; font-weight: bold; }
        .suma-col { color: #ffcc00; font-weight: bold; }
        .wystajace-col { color: #ff3333; font-weight: bold; }
        .level-col { color: #00e5ff; font-weight: bold; font-size: 16px; }
        .separator { border: 1px solid #600000; width: 95%; max-width: 1550px; margin: 40px auto; }
        .summary-box { background: #231212; padding: 15px; border-radius: 10px; border: 1px solid #4a0d0d; margin: 0 auto 20px auto; width: 95%; max-width: 1550px; }
        
        /* Kontenery sekcji */
        #sectionTracker, #sectionRanking { display: none; }
        #sectionTracker.active, #sectionRanking.active { display: block; }
        
        /* Podświetlenie Rasy w Rankingu */
        .rasa-wampir { color: #ff4444; font-weight: bold; }
        .rasa-wilkolak { color: #aaaaaa; font-weight: bold; }
        .rank-num { font-size: 18px; color: #ffcc00; font-weight: bold; }
    </style>
</head>
<body>
    <h1>Statystyki BiteFight</h1>
    
    <div class="tabs">
        <button id="tabTrackerBtn" class="tab-btn active" onclick="switchTab('tracker')">Twoi Gracze (Live)</button>
        <button id="tabRankingBtn" class="tab-btn" onclick="switchTab('ranking')">Ranking Serwera TOP 100</button>
    </div>

    <div id="sectionTracker" class="active">
        <div id="lastRefresh" style="color: #00e5ff; font-size: 16px; margin-bottom: 10px; font-weight: bold;"></div>
        <div id="status">Skrypt Google Sheets analizuje grę w tle. Tabela odświeża się automatycznie co 5 minut.</div>
        <button class="action-btn" onclick="window.location.href = urlGoogleSheet">Pobierz pełny raport (.csv)</button>

        <div class="summary-box">
            <div class="filter-container" style="margin-top: 5px; margin-bottom: 5px;">
                <span style="font-size: 18px; font-weight: bold; color: #ffcc00;">Historia:</span>
                <select id="summaryPeriodSelect">
                    <option value="TODAY">Dzisiaj</option>
                    <option value="YESTERDAY">Wczoraj</option>
                    <option value="THIS_WEEK">Bieżący tydzień (Pon - Ned)</option>
                    <option value="LAST_WEEK">Poprzedni tydzień (Pon - Ned)</option>
                    <option value="SPECIFIC_DAY">Archiwum: Konkretny dzień...</option>
                    <option value="SPECIFIC_WEEK">Archiwum: Konkretny tydzień...</option>
                </select>
                <select id="specificDateSelect" style="display: none;"></select>
            </div>
            <div id="summaryContainer"></div>
        </div>

        <hr class="separator">
        
        <h2>Pełny log operacji (Z filtrami)</h2>
        <div class="filter-container">
            <select id="filterDate">
                <option value="LAST_3_DAYS">Ostatnie 3 dni (Domyślnie)</option>
                <option value="ALL">Cała historia bazy</option>
                <option value="CUSTOM_RANGE">Własny zakres dat...</option>
            </select>
            <div id="customDateContainer" style="display: none; align-items: center; gap: 10px;">
                <input type="date" id="customStartDate" title="Data początkowa">
                <span style="font-weight: bold;">-</span>
                <input type="date" id="customEndDate" title="Data końcowa">
            </div>
            <select id="filterPlayer"><option value="ALL">Wszyscy gracze</option></select>
            <select id="filterStat"><option value="ALL">Wszystkie statystyki</option></select>
        </div>

        <div id="tableContainer"><p>Ładowanie najnowszych danych...</p></div>
    </div>

    <div id="sectionRanking">
        <h2>Aktualny Ranking TOP 100</h2>
        <div style="color: #888; font-size: 14px; margin-bottom: 20px;">Ranking odświeża się automatycznie raz dziennie (w nocy).</div>
        <div id="rankingTableContainer"><p>Ładowanie rankingu...</p></div>
    </div>

    <script>
        // === KONFIGURACJA LINKÓW ===
        const urlGoogleSheet = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQUL3LMQgsMw_kzKZkvQ8cKEp7XuCGkuPaWGVbQlGHdz8-C_oTMSZC7oEJjfzE5wwo-UoqmFU6FdAPT/pub?gid=0&single=true&output=csv";
        
        // Twój zaktualizowany i gotowy link do zakładki z Rankingiem:
        const urlRankingSheet = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQUL3LMQgsMw_kzKZkvQ8cKEp7XuCGkuPaWGVbQlGHdz8-C_oTMSZC7oEJjfzE5wwo-UoqmFU6FdAPT/pub?gid=109350413&single=true&output=csv"; 
        
        const BLACKLIST = ["Kark23"]; 
        let globalData = [];
        let uniqueDaysList = [];
        let uniqueWeeksList = [];

        // Obsługa zakładek
        function switchTab(tabId) {
            document.getElementById('tabTrackerBtn').classList.remove('active');
            document.getElementById('tabRankingBtn').classList.remove('active');
            document.getElementById('sectionTracker').classList.remove('active');
            document.getElementById('sectionRanking').classList.remove('active');

            if (tabId === 'tracker') {
                document.getElementById('tabTrackerBtn').classList.add('active');
                document.getElementById('sectionTracker').classList.add('active');
            } else if (tabId === 'ranking') {
                document.getElementById('tabRankingBtn').classList.add('active');
                document.getElementById('sectionRanking').classList.add('active');
                loadRankingData();
            }
        }

        // ==========================================
        //         MODUŁ 1: TWOI GRACZE (TRACKER)
        // ==========================================
        function handleFilterChange() {
            const fD = document.getElementById('filterDate').value;
            localStorage.setItem('bf_filterDate', fD);
            localStorage.setItem('bf_filterPlayer', document.getElementById('filterPlayer').value);
            localStorage.setItem('bf_filterStat', document.getElementById('filterStat').value);
            
            if (fD === 'CUSTOM_RANGE') {
                document.getElementById('customDateContainer').style.display = 'flex';
                localStorage.setItem('bf_customStart', document.getElementById('customStartDate').value);
                localStorage.setItem('bf_customEnd', document.getElementById('customEndDate').value);
            } else {
                document.getElementById('customDateContainer').style.display = 'none';
            }
            renderTable();
        }

        document.getElementById('filterDate').addEventListener('change', handleFilterChange);
        document.getElementById('filterPlayer').addEventListener('change', handleFilterChange);
        document.getElementById('filterStat').addEventListener('change', handleFilterChange);
        document.getElementById('customStartDate').addEventListener('change', handleFilterChange);
        document.getElementById('customEndDate').addEventListener('change', handleFilterChange);

        document.getElementById('summaryPeriodSelect').addEventListener('change', function() {
            const specSelect = document.getElementById('specificDateSelect');
            if (this.value === 'SPECIFIC_DAY') {
                specSelect.style.display = 'inline-block';
                populateSpecificOptions('DAY');
            } else if (this.value === 'SPECIFIC_WEEK') {
                specSelect.style.display = 'inline-block';
                populateSpecificOptions('WEEK');
            } else {
                specSelect.style.display = 'none';
            }
            renderSummaryTable();
        });
        document.getElementById('specificDateSelect').addEventListener('change', renderSummaryTable);

        function parseCSVLine(text) {
            let ret = [], val = "", inQuotes = false;
            for (let i = 0; i < text.length; i++) {
                let ch = text[i];
                if (inQuotes) {
                    if (ch === '"') {
                        if (i + 1 < text.length && text[i+1] === '"') { val += '"'; i++; }
                        else { inQuotes = false; }
                    } else { val += ch; }
                } else {
                    if (ch === '"') { inQuotes = true; }
                    else if (ch === ',') { ret.push(val); val = ""; }
                    else { val += ch; }
                }
            }
            ret.push(val);
            return ret;
        }

            if(!dateStr) return new Date(0);

                const dParts = dStr.split('.');
                return new Date(dParts[2], dParts[1] - 1, dParts[0], 0, 0, 0);
            }

            const parts = cleanStr.trim().split(/\s+/);
            if(parts.length < 2) return new Date
