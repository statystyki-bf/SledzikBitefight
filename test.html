<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>BiteFight Dashboard</title>
    <style>
        body { background-color: #0e0a0a; color: #ddd; font-family: Tahoma, sans-serif; text-align: center; padding: 5px; font-size: 11px; }
        .tabs { display: flex; justify-content: center; gap: 5px; margin-bottom: 10px; }
        .tab-btn { background: #222; color: #aaa; border: 1px solid #444; padding: 4px 10px; cursor: pointer; border-radius: 3px; font-size: 11px; }
        .tab-btn.active { background: #800; color: white; border: 1px solid #f00; }
        table { margin: 0 auto; border-collapse: collapse; width: 100%; max-width: 1400px; background-color: #1a1a1a; }
        th, td { border: 1px solid #333; padding: 2px 4px; text-align: center; }
        th { background: #333; cursor: pointer; color: #fff; font-size: 10px; }
        th:hover { background: #500; }
        #sectionTracker, #sectionRanking { display: none; }
        #sectionTracker.active, #sectionRanking.active { display: block; }
        .low { color: #5f5; } .high { color: #f55; }
    </style>
</head>
<body>
    <div class="tabs">
        <button id="tabTrackerBtn" class="tab-btn active" onclick="switchTab('tracker')">Gracze</button>
        <button id="tabRankingBtn" class="tab-btn" onclick="switchTab('ranking')">TOP 100</button>
    </div>
    <div id="sectionTracker" class="active"><div id="tableContainer"></div></div>
    <div id="sectionRanking"><div id="rankingTableContainer"></div></div>
    <script>
        const urlRankingSheet = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQUL3LMQgsMw_kzKZkvQ8cKEp7XuCGkuPaWGVbQlGHdz8-C_oTMSZC7oEJjfzE5wwo-UoqmFU6FdAPT/pub?gid=109350413&single=true&output=csv";
        let globalRankingData = [];
        let sortCol = 0, sortAsc = true;

        function switchTab(tabId) {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.querySelectorAll('div[id^="section"]').forEach(s => s.classList.remove('active'));
            if (tabId === 'tracker') {
                document.getElementById('tabTrackerBtn').classList.add('active');
                document.getElementById('sectionTracker').classList.add('active');
            } else {
                document.getElementById('tabRankingBtn').classList.add('active');
                document.getElementById('sectionRanking').classList.add('active');
                loadRankingData();
            }
        }

        async function loadRankingData() {
            const resp = await fetch(urlRankingSheet + '&t=' + new Date().getTime());
            const text = await resp.text();
            globalRankingData = text.trim().split('\n').slice(1).map(r => r.split(','));
            renderRanking();
        }

        function sort(col) {
            sortAsc = (sortCol === col) ? !sortAsc : true;
            sortCol = col;
            globalRankingData.sort((a, b) => {
                let vA = a[col].replace(/[^\d-]/g, ''), vB = b[col].replace(/[^\d-]/g, '');
                if (vA === "" || isNaN(vA)) return sortAsc ? a[col].localeCompare(b[col]) : b[col].localeCompare(a[col]);
                return sortAsc ? parseInt(vA) - parseInt(vB) : parseInt(vB) - parseInt(vA);
            });
            renderRanking();
        }

        function renderRanking() {
            let html = "<table><thead><tr>";
            ["LP", "RASA", "NICK", "LVL", "ŁUP", "BOJ", "WYG", "PRZ", "ZŁO+", "ZŁO-"].forEach((h, i) => html += `<th onclick="sort(${i})">${h} ⇕</th>`);
            html += "</tr></thead><tbody>";
            globalRankingData.forEach(r => html += "<tr>" + r.map(c => `<td>${c}</td>`).join("") + "</tr>");
            document.getElementById('rankingTableContainer').innerHTML = html + "</tbody></table>";
        }
    </script>
</body>
</html>
