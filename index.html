<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BiteFight - Raporty na żywo</title>
    <style>
        body { background-color: #1e0e0e; color: #e0e0e0; font-family: Arial, sans-serif; text-align: center; padding: 20px; }
        h1 { font-size: 36px; color: #c00c0c; }
        button { background: #1f7244; color: white; border: 2px solid #103c23; padding: 15px 30px; font-size: 20px; cursor: pointer; border-radius: 8px; font-weight: bold; margin-top: 10px; margin-bottom: 20px; transition: 0.3s; }
        button:hover { background: #165231; transform: scale(1.05); }
        #status { color: #888; font-size: 14px; margin-bottom: 20px;}
        .filter-container { margin-bottom: 25px; display: flex; justify-content: center; gap: 15px; flex-wrap: wrap; }
        select { background-color: #2b1717; color: white; border: 1px solid #600000; padding: 10px 15px; font-size: 16px; border-radius: 5px; outline: none; cursor: pointer; transition: 0.2s; }
        table { margin: 0 auto; border-collapse: collapse; width: 95%; max-width: 1300px; background-color: #2b1717; box-shadow: 0 0 15px rgba(0,0,0,0.8); font-size: 14px; }
        th, td { border: 1px solid #600000; padding: 10px; text-align: center; }
        th { background-color: #600000; color: white; font-weight: bold; text-transform: uppercase; }
        tr:nth-child(even) { background-color: #381e1e; }
        tr:hover { background-color: #4a2727; }
        .przyrost-col { color: #55ff55; font-weight: bold; }
        .suma-col { color: #ffcc00; font-weight: bold; }
    </style>
</head>
<body>
    <h1>Statystyki BiteFight (Live)</h1>
    <button id="downloadBtn">Pobierz pełny raport (.csv)</button>
    <div id="status">Skrypt Google Sheets analizuje grę w tle. Tabela odświeża się automatycznie co 5 minut.</div>

    <div class="filter-container">
        <select id="filterDate"><option value="ALL">Wszystkie dni</option></select>
        <select id="filterPlayer"><option value="ALL">Wszyscy gracze</option></select>
        <select id="filterStat"><option value="ALL">Wszystkie statystyki</option></select>
    </div>

    <div id="tableContainer"><p>Ładowanie najnowszych danych...</p></div>

    <script>
        const urlGoogleSheet = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQUL3LMQgsMw_kzKZkvQ8cKEp7XuCGkuPaWGVbQlGHdz8-C_oTMSZC7oEJjfzE5wwo-UoqmFU6FdAPT/pub?gid=0&single=true&output=csv";
        let globalData = [];

        document.getElementById('downloadBtn').addEventListener('click', () => window.location.href = urlGoogleSheet);
        
        // Zapisywanie wybranego filtru do pamięci przeglądarki i odświeżenie tabeli
        function handleFilterChange() {
            localStorage.setItem('bf_filterDate', document.getElementById('filterDate').value);
            localStorage.setItem('bf_filterPlayer', document.getElementById('filterPlayer').value);
            localStorage.setItem('bf_filterStat', document.getElementById('filterStat').value);
            renderTable();
        }

        document.getElementById('filterDate').addEventListener('change', handleFilterChange);
        document.getElementById('filterPlayer').addEventListener('change', handleFilterChange);
        document.getElementById('filterStat').addEventListener('change', handleFilterChange);

        async function loadTableData() {
            try {
                const response = await fetch(urlGoogleSheet + '&t=' + new Date().getTime());
                const text = await response.text();
                const wiersze = text.trim().split('\n');
                if (wiersze.length <= 1) return;

                let rawData = [];
                for (let i = 1; i < wiersze.length; i++) {
                    const komorki = wiersze[i].split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                    if (komorki.length < 2) continue;
                    rawData.push(komorki.map(k => k.replace(/(^"|"$)/g, '').trim()));
                }

                let playerAccumulator = {}; 
                globalData = [];

                rawData.forEach(row => {
                    let gracz = row[1];
                    let stat = row[2];
                    let przyrost = parseInt(row[5]) || 0;

                    if (!playerAccumulator[gracz]) playerAccumulator[gracz] = 0;

                    const atrybuty = ["Sila", "Obrona", "Zwinnosc", "Wytrzymalosc", "Charyzma"];
                    if (atrybuty.includes(stat)) {
                        playerAccumulator[gracz] = 0;
                    } 
                    else if (stat === "Zrabowane dobra") {
                        playerAccumulator[gracz] += przyrost;
                    }

                    let rowWithSum = [...row, playerAccumulator[gracz]];
                    globalData.push(rowWithSum);
                });

                globalData.reverse();

                updateFilters();
                renderTable();
            } catch (e) { console.error(e); }
        }

        function updateFilters() {
            const dni = new Set(), gracze = new Set(), statystyki = new Set();
            globalData.forEach(w => {
                if(w[0]) dni.add(w[0].split(',')[0].trim());
                if(w[1]) gracze.add(w[1]);
                if(w[2]) statystyki.add(w[2]);
            });
            
            const populate = (id, set, txt, storageKey) => {
                const s = document.getElementById(id);
                // Szukamy zapisanego wyboru w pamięci, jak nie ma, to zostawiamy to co jest
                let targetVal = localStorage.getItem(storageKey) || s.value;
                
                s.innerHTML = `<option value="ALL">${txt}</option>`;
                
                Array.from(set).sort().forEach(o => {
                    let el = document.createElement('option'); el.value = o; el.textContent = o;
                    if(o === targetVal) el.selected = true; // Zaznacza opcję z pamięci
                    s.appendChild(el);
                });

                // Jeśli gracz/statystyka z pamięci już nie istnieje w arkuszu, zresetuj pamięć na ALL
                if (s.value !== targetVal) {
                    localStorage.setItem(storageKey, 'ALL');
                }
            };
            
            populate('filterDate', dni, 'Wszystkie dni', 'bf_filterDate');
            populate('filterPlayer', gracze, 'Wszyscy gracze', 'bf_filterPlayer');
            populate('filterStat', statystyki, 'Wszystkie statystyki', 'bf_filterStat');
        }

        function renderTable() {
            const fD = document.getElementById('filterDate').value, fP = document.getElementById('filterPlayer').value, fS = document.getElementById('filterStat').value;
            let filtered = globalData.filter(w => (fD==='ALL'||w[0].startsWith(fD)) && (fP==='ALL'||w[1]===fP) && (fS==='ALL'||w[2]===fS));

            let html = "<table><thead><tr><th>Data i godzina</th><th>Gracz</th><th>Statystyka</th><th>Stara wartosc</th><th>Nowa wartosc</th><th>Przyrost</th><th>Suma od skilla</th></tr></thead><tbody>";
            
            filtered.forEach(w => {
                html += "<tr>";
                let isZrabowane = (w[2] === 'Zrabowane dobra');

                for(let j = 0; j < w.length; j++) {
                    let klasa = (j === 5) ? ' class="przyrost-col"' : (j === 6 ? ' class="suma-col"' : '');
                    let val = w[j];
                    
                    if (j === 5 && isZrabowane && val !== "") {
                        val = val.toString().replace(/\B(?=(\d{3})+(?!\d))/g, ".");
                    }
                    
                    if (j === 6) {
                        if (isZrabowane) {
                            val = val.toString().replace(/\B(?=(\d{3})+(?!\d))/g, ".");
                        } else {
                            val = ""; 
                        }
                    }

                    html += `<td${klasa}>${val}</td>`;
                }
                html += "</tr>";
            });
            document.getElementById('tableContainer').innerHTML = html + "</tbody></table>";
        }

        loadTableData();
        setInterval(loadTableData, 300000);
    </script>
</body>
</html>
