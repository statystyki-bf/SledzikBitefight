<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BiteFight - Raporty na żywo</title>
    <style>
        body { 
            background-color: #1e0e0e; 
            color: #e0e0e0; 
            font-family: Arial, sans-serif; 
            text-align: center; 
            padding: 20px; 
        }
        h1 { font-size: 36px; color: #c00c0c; }
        button { 
            background: #1f7244; 
            color: white; 
            border: 2px solid #103c23; 
            padding: 15px 30px; 
            font-size: 20px; 
            cursor: pointer; 
            border-radius: 8px; 
            font-weight: bold;
            margin-top: 10px;
            margin-bottom: 20px;
            transition: 0.3s;
        }
        button:hover { background: #165231; transform: scale(1.05); }
        #status { color: #888; font-size: 14px; margin-bottom: 20px;}
        
        /* Wygląd tabeli na stronie */
        table {
            margin: 0 auto;
            border-collapse: collapse;
            width: 95%;
            max-width: 1200px;
            background-color: #2b1717;
            box-shadow: 0 0 15px rgba(0,0,0,0.8);
            font-size: 15px;
        }
        th, td {
            border: 1px solid #600000;
            padding: 12px;
            text-align: center;
        }
        th {
            background-color: #600000;
            color: white;
            font-weight: bold;
            text-transform: uppercase;
        }
        tr:nth-child(even) { background-color: #381e1e; }
        tr:hover { background-color: #4a2727; }
        .przyrost-col { color: #55ff55; font-weight: bold; } /* Zielony kolor dla przyrostu */
    </style>
</head>
<body>
    <h1>Statystyki BiteFight (Live)</h1>
    
    <button id="downloadBtn">Pobierz pełny raport (.csv)</button>
    <div id="status">Skrypt Google Sheets analizuje grę w tle. Tabela odświeża się automatycznie co 5 minut.<br><b>Najnowsze wpisy widoczne są na samej górze.</b></div>

    <div id="tableContainer">
        <p>Ładowanie najnowszych danych z bazy Google...</p>
    </div>

    <script>
        // Link wystawiony przez Twój Arkusz Google
        const urlGoogleSheet = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQUL3LMQgsMw_kzKZkvQ8cKEp7XuCGkuPaWGVbQlGHdz8-C_oTMSZC7oEJjfzE5wwo-UoqmFU6FdAPT/pub?gid=0&single=true&output=csv";

        // Obsługa zielonego przycisku
        document.getElementById('downloadBtn').addEventListener('click', function() {
            document.getElementById('status').innerHTML = "Pobieranie arkusza...";
            window.location.href = urlGoogleSheet;
        });

        // Wczytywanie tabeli CSV prosto na stronę
        async function loadTableData() {
            const container = document.getElementById('tableContainer');
            try {
                // Trik z dodaniem czasu (&t=), aby omijać pamięć podręczną przeglądarki i zawsze brać najświeższe dane
                const response = await fetch(urlGoogleSheet + '&t=' + new Date().getTime());
                if (!response.ok) throw new Error("Błąd pobierania bazy");
                
                const text = await response.text();
                const wiersze = text.trim().split('\n');
                
                if (wiersze.length <= 1) {
                    container.innerHTML = "<p>Brak danych do wyświetlenia. Czekam na statystyki...</p>";
                    return;
                }

                let tableHTML = "<table><thead><tr>";
                
                // Sztywne nagłówki
                const bezpieczneNaglowki = ["Data i godzina", "Gracz", "Statystyka", "Stara wartosc", "Nowa wartosc", "Przyrost"];
                bezpieczneNaglowki.forEach(naglowek => {
                    tableHTML += `<th>${naglowek}</th>`;
                });
                tableHTML += "</tr></thead><tbody>";

                // Pętla idąca od końca (najnowsze przyrosty lądują na szczycie tabeli)
                for (let i = wiersze.length - 1; i >= 1; i--) {
                    // Magia dzielenia CSV: Arkusze Google używają przecinków. Ta komenda ignoruje przecinki ukryte w datach.
                    const komorki = wiersze[i].split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                    if (komorki.length < 2) continue;
                    
                    tableHTML += "<tr>";
                    for(let j = 0; j < komorki.length; j++) {
                        let klasa = (j === 5) ? ' class="przyrost-col"' : '';
                        
                        // Zdejmujemy cudzysłowy (jeśli Google jakieś nałożyło)
                        let czystaWartosc = komorki[j].replace(/(^"|"$)/g, '').trim();
                        tableHTML += `<td${klasa}>${czystaWartosc}</td>`;
                    }
                    tableHTML += "</tr>";
                }
                
                tableHTML += "</tbody></table>";
                container.innerHTML = tableHTML;

            } catch (error) {
                container.innerHTML = `<p style="color: #ff5555; font-size: 18px;">Nie można połączyć się z serwerem Google.<br>Błąd: ${error.message}</p>`;
            }
        }

        // Pierwsze załadowanie od razu po wejściu na stronę
        loadTableData();
        
        // Magia: Strona sama aktualizuje tabelę co 5 minut bez klikania F5
        setInterval(loadTableData, 300000);
    </script>
</body>
</html>
